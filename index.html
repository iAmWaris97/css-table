<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML/CSS Table</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <table class="invoice-table">
        <tr>
            <th colspan="3">Invoice #123456789</th>
            <th>14 January 2025</th>
        </tr>

        <tr>
            <td colspan="2">
                <table class="payment seller">
                    <tr>
                        <th>Pay to:</th>
                    </tr>
                    <tr>
                        <td>Acme Billing Co.</td>
                    </tr>
                    <tr>
                        <td>123 Main St.</td>
                    </tr>
                    <tr>
                        <td>Cityville, NA 12345</td>
                    </tr>

                </table>
            </td>

            <td id="left" colspan="2">
                <table class="payment customer">
                    <tr>
                        <th>Customer:</th>
                    </tr>
                    <tr>
                        <td>John Smith</td>
                    </tr>
                    <tr>
                        <td>321 Willow Way</td>
                    </tr>
                    <tr>
                        <td>Southeast Northwestershire, MA 54321</td>
                    </tr>
                </table>
            </td>
        </tr>

        <tr id="fixed">
            <th>Name / Discription</th>
            <th>Qty.</th>
            <th>@</th>
            <th>Cost</th>
        </tr>

        <tr id="fixed">
            <td>Paperclips</td>
            <td>1000</td>
            <td>0.01</td>
            <td>10.00</td>
        </tr>

        <tr id="fixed">
            <td>Staples</td>
            <td>100</td>
            <td>1.00</td>
            <td>100.00</td>
        </tr>

        <tr>
            <th colspan="3">Subtotal</th>
            <td>110.00</td>
        </tr>

        <tr>
            <th colspan="2">Tax</th>
            <td>8%</td>
            <td>8.80</td>
        </tr>

        <tr>
            <th colspan="3">Grand Total</th>
            <td>$ 118.80</td>
        </tr>
    </table>
</body>

</html>
